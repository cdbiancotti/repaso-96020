{% extends "base.html" %}

{% block title_head %}Borrar Paleta{% endblock title_head %}

{% block h1_header %}Borrar Paleta{% endblock h1_header %}

{% block contenido %}

<form action="{% url "paletas:borrar" paletas.id %}" method="post">
    {% csrf_token %}

    <p>¿Estás seguro de que quieres borrar la paleta "{{ paleta }}"?</p>

    <input type="submit" value="Confirmar borrado">

</form>

{% endblock contenido %}
